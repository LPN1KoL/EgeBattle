<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Страница не найдена</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            color: #1a1a2e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-card {
            text-align: center;
            background: #fff;
            border-radius: 16px;
            padding: 40px 30px;
            max-width: 420px;
            margin: 20px;
            border: 1px solid #e0e3ea;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
        }
        .error-code {
            font-size: 5em;
            font-weight: 800;
            color: #4a6cf7;
            line-height: 1;
            margin-bottom: 10px;
        }
        .error-title {
            font-size: 1.3em;
            color: #2c3e6b;
            margin-bottom: 12px;
        }
        .error-text {
            color: #888;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        .btn {
            display: inline-block;
            padding: 10px 24px;
            background: #4a6cf7;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn:hover { background: #3a5ce7; }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-code">404</div>
        <div class="error-title">Страница не найдена</div>
        <p class="error-text">Возможно, комната была удалена или ссылка устарела.</p>
        <a href="/" class="btn">На главную</a>
    </div>
</body>
</html>
